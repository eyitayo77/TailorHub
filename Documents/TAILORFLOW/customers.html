<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers — Tailor Hub</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="components.css" />
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main-content">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="page-title">Customers</div>
          <div class="page-subtitle" id="customer-count">Loading…</div>
        </div>
        <button class="btn btn-primary" id="add-customer-btn" onclick="Utils.openModal('customer-modal')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add customer
        </button>
      </div>

      <div style="margin-bottom:18px;">
        <input type="text" id="customer-search" placeholder="Search by name, phone or email…" style="max-width:380px;" />
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Phone</th>
                <th>Measurements</th>
                <th>Orders</th>
                <th style="text-align:right">Total spent</th>
                <th style="width:72px"></th>
              </tr>
            </thead>
            <tbody id="customers-body">
              <tr><td colspan="5"><div class="loading-state"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add / Edit Customer Modal -->
  <div class="modal-overlay" id="customer-modal">
    <div class="modal" style="max-width:540px;">
      <div class="modal-header">
        <div class="modal-title" id="customer-modal-title">Add customer</div>
        <button class="modal-close" data-close-modal>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="customer-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" id="c-name" placeholder="Customer name" required />
          </div>
          <div class="form-group">
            <label>Phone number</label>
            <input type="text" id="c-phone" placeholder="08XXXXXXXXX" />
          </div>
        </div>
        <div class="form-group">
          <label>Email (optional)</label>
          <input type="email" id="c-email" placeholder="customer@email.com" />
        </div>

        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin:20px 0 12px;">Measurements (optional)</div>
        <div class="form-group">
          <label>Garment template</label>
          <select id="c-template" onchange="applyTemplate(this.value)">
            <option value="general">General</option>
            <option value="agbada">Agbada / Kaftan</option>
            <option value="senator">Senator / Babariga</option>
            <option value="suit">Suit / Corporate</option>
            <option value="gown">Gown / Dress</option>
            <option value="skirt-blouse">Skirt & Blouse</option>
            <option value="aso-ebi">Aso-ebi / Lace</option>
            <option value="children">Children's Wear</option>
          </select>
        </div>
        <div id="measurement-fields"></div>
        <div class="form-group">
          <label>Extra notes</label>
          <textarea id="c-notes" placeholder="Any extra measurements or special instructions…" style="min-height:70px;"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-danger" id="c-delete-btn" style="display:none;margin-right:auto;" onclick="deleteCustomer()">Delete customer</button>
          <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary" id="c-save-btn">Save customer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="sidebar.js"></script>
  <script src="customers.js"></script>
</body>
</html>
