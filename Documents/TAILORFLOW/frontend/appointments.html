<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments — Tailor Hub</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    .section-label {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main-content">
      <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="page-title">Appointments</div>
          <div class="page-subtitle">Manage fittings, pickups and measurements</div>
        </div>
        <button class="btn btn-primary" onclick="Utils.openModal('appt-modal')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New appointment
        </button>
      </div>

      <!-- Today section (hidden when empty) -->
      <div id="today-section" style="display:none;margin-bottom:28px;">
        <div class="section-label">Today</div>
        <div id="today-list"></div>
      </div>

      <div class="section-label" id="upcoming-label">Upcoming</div>
      <div id="upcoming-list" style="margin-bottom:36px;">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>

      <div class="section-label" id="past-label">Past</div>
      <div id="past-list">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- New Appointment Modal -->
  <div class="modal-overlay" id="appt-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">New appointment</div>
        <button class="modal-close" data-close-modal>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="appt-form" novalidate>
        <div class="form-group">
          <label>Customer name</label>
          <input type="text" id="a-customer" placeholder="Customer name" required />
        </div>
        <div class="form-group">
          <label>Appointment type</label>
          <select id="a-type">
            <option value="Measurement">Measurement</option>
            <option value="First fitting">First fitting</option>
            <option value="Final fitting">Final fitting</option>
            <option value="Pickup">Pickup</option>
            <option value="Consultation">Consultation</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="a-date" required />
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" id="a-time" />
          </div>
        </div>
        <div class="form-group">
          <label>Notes (optional)</label>
          <textarea id="a-notes" placeholder="Any notes for this appointment…"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary" id="a-save-btn">Book appointment</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="sidebar.js"></script>
  <script src="appointments.js"></script>
</body>
</html>
