<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailor Hub — Forgot Password</title>
  <link rel="stylesheet" href="main.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      padding: 24px;
    }
    .wrap { width: 100%; max-width: 400px; }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .login-logo-mark {
      width: 36px; height: 36px;
      background: var(--purple-600);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-mark svg { width: 18px; height: 18px; }
    .login-brand-name { font-size: 20px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
    .login-brand-name span { color: var(--purple-600); }
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 32px;
    }
    .card-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; color: var(--text-primary); margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    input {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-size: 14px; font-family: var(--font-body);
      color: var(--text-primary); background: var(--bg-surface);
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--purple-400); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
    input::placeholder { color: var(--text-muted); }
    .btn-primary {
      width: 100%; padding: 11px;
      background: var(--purple-600); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 500; font-family: var(--font-body);
      cursor: pointer; transition: background 0.15s; margin-top: 8px;
    }
    .btn-primary:hover { background: var(--purple-800); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .footer a { color: var(--purple-600); font-weight: 500; }
    .error-msg {
      background: var(--red-50); color: var(--red-600);
      font-size: 13px; padding: 10px 14px;
      border-radius: var(--radius-md); margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .success-box {
      text-align: center; display: none; padding: 8px 0;
    }
    .success-box.show { display: block; }
    .success-icon {
      width: 52px; height: 52px;
      background: var(--teal-50); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="login-brand">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="login-brand-name">Tailor<span>Hub</span></div>
    </div>

    <div class="card">
      <!-- Form state -->
      <div id="form-state">
        <div class="card-title">Forgot your password?</div>
        <div class="card-sub">Enter your email and we'll send you a reset link.</div>

        <div class="error-msg" id="error-msg"></div>

        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <button type="submit" class="btn-primary" id="submit-btn">Send reset link</button>
        </form>
      </div>

      <!-- Success state -->
      <div class="success-box" id="success-state">
        <div class="success-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--teal-600)" stroke-width="2.2" stroke-linecap="round">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </div>
        <div class="success-title">Check your email</div>
        <div class="success-sub">
          We sent a password reset link to <strong id="sent-to"></strong>.<br/>
          It expires in 1 hour.
        </div>
      </div>

      <div class="footer">
        <a href="index.html">← Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const form      = document.getElementById('forgot-form');
    const btn       = document.getElementById('submit-btn');
    const errorMsg  = document.getElementById('error-msg');

    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); }
    function hideError()    { errorMsg.classList.remove('show'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      try {
        const base = window.API_BASE_URL || 'http://localhost:8000/api';
        const res = await fetch(`${base}/auth/forgot-password`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Something went wrong.');

        // Show success regardless (backend never reveals if email exists)
        document.getElementById('form-state').style.display  = 'none';
        document.getElementById('sent-to').textContent       = email;
        document.getElementById('success-state').classList.add('show');
      } catch (err) {
        showError(err.message);
        btn.disabled    = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
