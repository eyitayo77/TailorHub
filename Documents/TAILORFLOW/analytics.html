<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — Tailor Hub</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    .period-tabs { display:flex; gap:6px; margin-bottom:24px; }
    .period-tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-medium);
      background: transparent; color: var(--text-secondary);
      transition: all 0.15s;
    }
    .period-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
    .period-tab.active { background: var(--purple-600); color: #fff; border-color: var(--purple-600); }

    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }
    @media (max-width: 900px) {
      .analytics-grid { grid-template-columns: 1fr; }
    }

    .tc-row {
      display:flex; align-items:center; gap:10px;
      padding:9px 0;
      border-bottom:1px solid var(--border-light);
    }
    .tc-row:last-child { border-bottom:none; padding-bottom:0; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main-content">
      <div class="page-header">
        <div class="page-title">Analytics</div>
        <div class="page-subtitle">Performance overview of your tailoring business</div>
      </div>

      <div class="period-tabs" id="period-tabs">
        <button class="period-tab" data-period="week">This week</button>
        <button class="period-tab active" data-period="month">This month</button>
        <button class="period-tab" data-period="year">This year</button>
      </div>

      <!-- KPI cards -->
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">Total revenue</div>
          <div class="metric-value" id="a-revenue">—</div>
          <div class="metric-delta" id="a-revenue-delta">Loading…</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Orders completed</div>
          <div class="metric-value" id="a-orders">—</div>
          <div class="metric-delta neutral" id="a-orders-delta">Loading…</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Avg order value</div>
          <div class="metric-value" id="a-avg">—</div>
          <div class="metric-delta neutral" id="a-avg-delta">Loading…</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">New customers</div>
          <div class="metric-value" id="a-customers">—</div>
          <div class="metric-delta" id="a-customers-delta">Loading…</div>
        </div>
      </div>

      <!-- Charts grid -->
      <div class="analytics-grid">
        <div class="card">
          <div class="card-header"><div class="card-title" id="revenue-bar-label">Revenue by week</div></div>
          <div id="revenue-bars"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title">Order status breakdown</div></div>
          <div id="status-bars"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Top customers</div>
            <a href="customers.html" class="card-action">View all →</a>
          </div>
          <div id="top-customers-list"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>

        <div class="card">
          <div class="card-header"><div class="card-title">Popular garments</div></div>
          <div id="garment-bars"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="sidebar.js"></script>
  <script src="analytics.js"></script>
</body>
</html>
