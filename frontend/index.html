<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailor Hub — Login</title>
  <link rel="stylesheet" href="main.css" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 400px;
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .login-logo-mark {
      width: 36px;
      height: 36px;
      background: var(--purple-600);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-logo-mark svg {
      width: 18px;
      height: 18px;
    }

    .login-brand-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .login-brand-name span {
      color: var(--purple-600);
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 32px;
    }

    .login-heading {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--text-primary);
      background: var(--bg-surface);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--purple-400);
      box-shadow: 0 0 0 3px rgba(127, 119, 221, 0.15);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 11px;
      background: var(--purple-600);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 500;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .login-btn:hover {
      background: var(--purple-800);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .login-footer a {
      color: var(--purple-600);
      font-weight: 500;
    }

    .error-msg {
      background: var(--red-50);
      color: var(--red-600);
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    .demo-btn {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
    }

    .demo-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <div class="login-brand-name">Tailor<span>Flow</span></div>
    </div>

    <div class="login-card">
      <div class="login-heading">Welcome back</div>
      <div class="login-sub">Sign in to manage your tailoring business</div>

      <div class="error-msg" id="error-msg"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required
            autocomplete="current-password" />
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign in</button>
        <div style="text-align:right;margin-top:10px;">
          <a href="forgot.html" style="font-size:13px;color:var(--purple-600);font-weight:500;">Forgot password?</a>
        </div>
      </form>

      <div class="divider">or</div>
      <button class="demo-btn" id="demo-btn">Continue with demo account</button>

      <div class="login-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="api.js"></script>
  <script>
    Auth.redirectIfLoggedIn();

    const form     = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const demoBtn  = document.getElementById('demo-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }
    function hideError() { errorMsg.classList.remove('show'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please fill in all fields.'); return; }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'Signing in…';

      try {
        const data = await API.auth.login(email, password);
        Auth.setSession(data.access_token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message || 'Login failed. Please check your email and password.');
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Sign in';
      }
    });

    // Demo: pre-fill credentials (create this account via /api/auth/register first)
    demoBtn.addEventListener('click', () => {
      document.getElementById('email').value    = 'demo@tailorflow.ng';
      document.getElementById('password').value = 'demo1234';
      form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>

</html>
