<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Tailor Hub</title>
  <link rel="stylesheet" href="main.css" />
  <link rel="stylesheet" href="components.css" />
  <style>
    .profile-wrap {
      max-width: 620px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Hero card ── */
    .profile-hero {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .profile-avatar-xl {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: var(--purple-600);
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-hero-name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .profile-hero-biz {
      font-size: 13px;
      font-weight: 500;
      color: var(--purple-600);
      margin-bottom: 2px;
    }
    .profile-hero-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Section divider ── */
    .section-divider {
      height: 1px;
      background: var(--border-light);
      margin: 4px 0 20px;
    }

    /* ── Action row ── */
    .profile-actions {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
      margin-top: 4px;
    }

    /* ── Security hint ── */
    .security-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main-content">
      <div class="page-header">
        <div class="page-title">My Profile</div>
        <div class="page-subtitle">View and update your account details</div>
      </div>

      <div class="profile-wrap">

        <!-- Hero card -->
        <div class="card">
          <div class="profile-hero">
            <div class="profile-avatar-xl" id="profile-avatar-xl">TH</div>
            <div>
              <div class="profile-hero-name" id="profile-hero-name">Loading…</div>
              <div class="profile-hero-biz" id="profile-hero-biz"></div>
              <div class="profile-hero-email" id="profile-hero-email">—</div>
            </div>
          </div>
        </div>

        <!-- Account information -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Account information</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:1px">Your name and business details</div>
            </div>
            <button class="btn btn-ghost btn-sm" id="edit-toggle-btn">Edit</button>
          </div>

          <div class="section-divider"></div>

          <form id="profile-form">
            <div class="form-row">
              <div class="form-group">
                <label>Full name</label>
                <input type="text" id="pf-name" disabled />
              </div>
              <div class="form-group">
                <label>Business name</label>
                <input type="text" id="pf-business" disabled />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group" style="margin-bottom:0">
                <label>Email address</label>
                <input type="email" id="pf-email" disabled />
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label>Phone number</label>
                <input type="text" id="pf-phone" disabled placeholder="Not set" />
              </div>
            </div>
            <div class="profile-actions" id="profile-save-row" style="display:none">
              <button type="submit" class="btn btn-primary btn-sm">Save changes</button>
              <button type="button" class="btn btn-ghost btn-sm" id="cancel-edit-btn">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Security -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Security</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:1px">Change your account password</div>
            </div>
          </div>

          <div class="section-divider"></div>

          <form id="password-form">
            <div class="form-group">
              <label>Current password</label>
              <input type="password" id="pw-current" placeholder="Enter your current password" />
            </div>
            <div class="form-row">
              <div class="form-group" style="margin-bottom:0">
                <label>New password</label>
                <input type="password" id="pw-new" placeholder="At least 8 characters" />
              </div>
              <div class="form-group" style="margin-bottom:0">
                <label>Confirm new password</label>
                <input type="password" id="pw-confirm" placeholder="Repeat new password" />
              </div>
            </div>
            <div class="profile-actions">
              <button type="submit" class="btn btn-primary btn-sm" id="pw-submit-btn">Update password</button>
            </div>
          </form>
        </div>

      </div><!-- /.profile-wrap -->
    </main>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;
      Sidebar.init('profile.html');

      let user = Auth.getUser();
      if (!user) return;

      function populateDisplay(u) {
        const initials = (u.name || 'TH').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        document.getElementById('profile-avatar-xl').textContent  = initials;
        document.getElementById('profile-hero-name').textContent  = u.name || '—';
        document.getElementById('profile-hero-biz').textContent   = u.business_name || '';
        document.getElementById('profile-hero-email').textContent = u.email || '—';
      }

      function populateForm(u) {
        document.getElementById('pf-name').value     = u.name || '';
        document.getElementById('pf-business').value = u.business_name || '';
        document.getElementById('pf-email').value    = u.email || '';
        document.getElementById('pf-phone').value    = u.phone || '';
      }

      populateDisplay(user);
      populateForm(user);

      const editBtn   = document.getElementById('edit-toggle-btn');
      const saveRow   = document.getElementById('profile-save-row');
      const cancelBtn = document.getElementById('cancel-edit-btn');

      function editableInputs() {
        return document.querySelectorAll('#profile-form input:not([type="email"])');
      }

      editBtn.addEventListener('click', () => {
        editableInputs().forEach(i => i.disabled = false);
        saveRow.style.display = 'flex';
        editBtn.style.display = 'none';
      });

      cancelBtn.addEventListener('click', () => {
        populateForm(user);
        editableInputs().forEach(i => i.disabled = true);
        saveRow.style.display = 'none';
        editBtn.style.display = '';
      });

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.submitter;
        U.setLoading(btn, true);
        try {
          const updated = await API.auth.updateProfile({
            name:          document.getElementById('pf-name').value.trim(),
            business_name: document.getElementById('pf-business').value.trim() || null,
            phone:         document.getElementById('pf-phone').value.trim() || null,
          });
          Auth.setSession(Auth.getToken(), updated);
          user = updated;
          populateDisplay(updated);
          populateForm(updated);
          editableInputs().forEach(i => i.disabled = true);
          saveRow.style.display = 'none';
          editBtn.style.display = '';
          U.toast('Profile updated', 'success');
        } catch (err) {
          U.toast(err.message, 'error');
        } finally {
          U.setLoading(btn, false);
        }
      });

      document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPwd     = document.getElementById('pw-new').value;
        const confirmPwd = document.getElementById('pw-confirm').value;
        if (newPwd !== confirmPwd) { U.toast('Passwords do not match', 'error'); return; }
        if (newPwd.length < 8)    { U.toast('Password must be at least 8 characters', 'error'); return; }
        const btn = document.getElementById('pw-submit-btn');
        U.setLoading(btn, true);
        try {
          await API.auth.changePassword({
            current_password: document.getElementById('pw-current').value,
            new_password:     newPwd,
          });
          U.toast('Password updated', 'success');
          document.getElementById('password-form').reset();
        } catch (err) {
          U.toast(err.message, 'error');
        } finally {
          U.setLoading(btn, false);
        }
      });
    });
  </script>
</body>
</html>
