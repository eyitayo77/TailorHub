<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailor Hub — Reset Password</title>
  <link rel="stylesheet" href="main.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      padding: 24px;
    }
    .wrap { width: 100%; max-width: 400px; }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
    .login-logo-mark {
      width: 36px; height: 36px;
      background: var(--purple-600);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-mark svg { width: 18px; height: 18px; }
    .login-brand-name { font-size: 20px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
    .login-brand-name span { color: var(--purple-600); }
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-xl);
      padding: 32px;
    }
    .card-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; color: var(--text-primary); margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
    input {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-size: 14px; font-family: var(--font-body);
      color: var(--text-primary); background: var(--bg-surface);
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--purple-400); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); }
    input::placeholder { color: var(--text-muted); }
    .btn-primary {
      width: 100%; padding: 11px;
      background: var(--purple-600); color: #fff;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 500; font-family: var(--font-body);
      cursor: pointer; transition: background 0.15s; margin-top: 8px;
    }
    .btn-primary:hover { background: var(--purple-800); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .footer a { color: var(--purple-600); font-weight: 500; }
    .error-msg {
      background: var(--red-50); color: var(--red-600);
      font-size: 13px; padding: 10px 14px;
      border-radius: var(--radius-md); margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .invalid-box {
      text-align: center; padding: 8px 0;
    }
    .invalid-icon {
      width: 52px; height: 52px;
      background: var(--red-50); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .invalid-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .invalid-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
    .success-box { text-align: center; display: none; padding: 8px 0; }
    .success-box.show { display: block; }
    .success-icon {
      width: 52px; height: 52px;
      background: var(--teal-50); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .success-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
    .btn-outline {
      display: inline-block; padding: 10px 24px;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-md);
      font-size: 14px; font-weight: 500;
      color: var(--text-primary); text-decoration: none;
      transition: background 0.15s;
    }
    .btn-outline:hover { background: var(--bg-hover); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="login-brand">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="login-brand-name">Tailor<span>Hub</span></div>
    </div>

    <div class="card">

      <!-- Invalid/missing token -->
      <div class="invalid-box" id="invalid-state" style="display:none;">
        <div class="invalid-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--red-600)" stroke-width="2.2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="invalid-title">Invalid reset link</div>
        <div class="invalid-sub">This link is invalid or has expired.<br/>Please request a new one.</div>
        <a href="forgot.html" class="btn-outline">Request new link</a>
      </div>

      <!-- Reset form -->
      <div id="form-state" style="display:none;">
        <div class="card-title">Set new password</div>
        <div class="card-sub">Choose a strong password for your account.</div>

        <div class="error-msg" id="error-msg"></div>

        <form id="reset-form" novalidate>
          <div class="form-group">
            <label for="password">New password</label>
            <input type="password" id="password" placeholder="At least 8 characters" required />
          </div>
          <div class="form-group">
            <label for="confirm">Confirm password</label>
            <input type="password" id="confirm" placeholder="Repeat your password" required />
          </div>
          <button type="submit" class="btn-primary" id="submit-btn">Update password</button>
        </form>
      </div>

      <!-- Success state -->
      <div class="success-box" id="success-state">
        <div class="success-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--teal-600)" stroke-width="2.2" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="success-title">Password updated!</div>
        <div class="success-sub">Your password has been changed successfully. You can now sign in.</div>
        <a href="index.html" class="btn-outline">Go to sign in</a>
      </div>

      <div class="footer" id="footer-link">
        <a href="index.html">← Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('invalid-state').style.display = 'block';
      document.getElementById('footer-link').style.display   = 'none';
    } else {
      document.getElementById('form-state').style.display = 'block';
    }

    const form     = document.getElementById('reset-form');
    const btn      = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');

    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('show'); }
    function hideError()    { errorMsg.classList.remove('show'); }

    form?.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirm) { showError('Passwords do not match.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Updating…';

      try {
        const base = window.API_BASE_URL || 'http://localhost:8000/api';
        const res = await fetch(`${base}/auth/reset-password`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Something went wrong.');

        document.getElementById('form-state').style.display  = 'none';
        document.getElementById('footer-link').style.display = 'none';
        document.getElementById('success-state').classList.add('show');
      } catch (err) {
        if (err.message.includes('expired') || err.message.includes('Invalid')) {
          document.getElementById('form-state').style.display   = 'none';
          document.getElementById('invalid-state').style.display = 'block';
          document.getElementById('footer-link').style.display   = 'none';
        } else {
          showError(err.message);
          btn.disabled    = false;
          btn.textContent = 'Update password';
        }
      }
    });
  </script>
</body>
</html>
